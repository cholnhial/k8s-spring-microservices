apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: shopnow
  labels:
    app: cart-service
    part-of: shopnow
    version: "1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
        part-of: shopnow
        version: "1.0"
    spec:
      containers:
        - name: cart-service
          image: shopnow/cart-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8085
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "768Mi"
              cpu: "500m"
