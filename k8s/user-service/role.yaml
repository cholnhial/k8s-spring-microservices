apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: user-service-role
  namespace: shopnow
  labels:
    app: user-service
    part-of: shopnow
    version: "1.0"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - "user-db-credentials"
      - "jwt-secret"
    verbs: ["get"]
