apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: user-service-rolebinding
  namespace: shopnow
  labels:
    app: user-service
    part-of: shopnow
    version: "1.0"
subjects:
  - kind: ServiceAccount
    name: user-service
    namespace: shopnow
roleRef:
  kind: Role
  name: user-service-role
  apiGroup: rbac.authorization.k8s.io
